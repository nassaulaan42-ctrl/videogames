<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nick's speelparadijs</title>
    <meta
      name="description"
      content="Jouw plek voor de grofste spelletjes"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="header-container">
        <img
          src="assets/nick_laptop.png"
          alt="Nick's Laptop"
          class="header-asset"
        />
        <header class="hero">
          <h1 class="bounceIn">Nick's<br />speelparadijs</h1>
          <p class="bounceIn">Jouw plek voor de grofste spelletjes</p>
        </header>
      </div>

      <main class="gallery grid">
        <a
          href="games/africraft/africraft.html"
          class="card floating"
          style="animation-delay: 0s"
        >
          <div class="icon-container" style="background-color: #4caf50">🌍</div>
          <h2>Africraft</h2>
        </a>

        <a
          href="games/chirstmas_simulator/christmas_simulator.html"
          class="card floating"
          style="animation-delay: 0.2s"
        >
          <div class="icon-container" style="background-color: #e91e63">
            <img
              src="assets/christmas_icon.png"
              alt="Christmas Icon"
              class="pixel-icon"
            />
          </div>
          <h2>Magdenburg 2024</h2>
        </a>

        <a
          href="games/flappyclone/index.html"
          class="card floating"
          style="animation-delay: 0.4s"
        >
          <div class="icon-container" style="background-color: #ffc107">
            <img
              src="assets/flappy_icon.png"
              alt="Flappy Icon"
              class="pixel-icon"
            />
          </div>
          <h2>9/11 atta challenge</h2>
        </a>

        <a
          href="games/jew/jew.html"
          class="card floating"
          style="animation-delay: 0.6s"
        >
          <div class="icon-container" style="background-color: #ffd700">🪙</div>
          <h2>Jew Collector</h2>
        </a>
      </main>

      <footer>
        <p>&copy; 2026 Nick productions. Alle rechten voorbehouden.</p>
      </footer>
    </div>

    <script>
      // Simple sparkle effect on mouse move
      document.addEventListener("mousemove", (e) => {
        if (Math.random() > 0.9) {
          const sparkle = document.createElement("div");
          sparkle.textContent = "✨";
          sparkle.style.position = "fixed";
          sparkle.style.left = e.clientX + "px";
          sparkle.style.top = e.clientY + "px";
          sparkle.style.pointerEvents = "none";
          sparkle.style.fontSize = "1.2rem";
          sparkle.style.animation = "sparkleAnim 1s ease-out forwards";
          document.body.appendChild(sparkle);
          setTimeout(() => sparkle.remove(), 1000);
        }
      });

      // Add a style for sparkleAnim
      const style = document.createElement("style");
      style.textContent = `
            @keyframes sparkleAnim {
                0% { transform: translateY(0) scale(1); opacity: 1; }
                100% { transform: translateY(-50px) scale(0); opacity: 0; }
            }
        `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
